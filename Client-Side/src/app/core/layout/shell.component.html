<div class="shell">
  <header class="shell__header">
    <div class="container shell__nav">
      <a class="brand" routerLink="/">
        <span class="brand__mark">FinEdge</span>
        <span class="brand__tag">FinTech BlogPost</span>
      </a>

      <nav class="nav">
        <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/stocks" routerLinkActive="is-active">Stocks</a>
        <a routerLink="/portfolio" routerLinkActive="is-active">Portfolio</a>
      </nav>

      <div class="actions" *ngIf="user$ | async as user; else loggedOut">
        <button class="btn btn-ghost theme-toggle" type="button" (click)="toggleTheme()">
          <span *ngIf="theme$ | async as theme">{{ theme === 'dark' ? 'Light Mode' : 'Dark Mode' }}</span>
        </button>
        <span class="pill">Hi, {{ user.userName }}</span>
        <a class="btn btn-secondary" routerLink="/stocks/new">Add Stock</a>
        <button class="btn btn-ghost" type="button" (click)="logout()">Logout</button>
      </div>

      <ng-template #loggedOut>
        <div class="actions">
          <button class="btn btn-ghost theme-toggle" type="button" (click)="toggleTheme()">
            <span *ngIf="theme$ | async as theme">{{ theme === 'dark' ? 'Light Mode' : 'Dark Mode' }}</span>
          </button>
          <a class="btn btn-secondary" routerLink="/auth/login">Login</a>
          <a class="btn" routerLink="/auth/register">Create Account</a>
        </div>
      </ng-template>
    </div>
  </header>

  <main class="shell__main">
    <router-outlet />
  </main>

  <footer class="shell__footer">
    <div class="container footer-grid">
      <div>
        <div class="brand__mark">FinEdge</div>
        <p class="muted">Modern fintech insights, powered by your API.</p>
      </div>
      <div>
        <p class="footer-title">Explore</p>
        <a routerLink="/stocks">Stock Explorer</a>
        <a routerLink="/portfolio">Your Portfolio</a>
      </div>
      <div>
        <p class="footer-title">Account</p>
        <a routerLink="/auth/login">Login</a>
        <a routerLink="/auth/register">Register</a>
      </div>
    </div>
  </footer>
</div>
